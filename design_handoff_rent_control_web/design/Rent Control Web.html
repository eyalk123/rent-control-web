<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rent Control — web</title>
  <link rel="icon" href="assets/icon-512.png" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: var(--rc-bg); overflow: hidden; }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: var(--rc-font-sans); -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; }
    input, textarea, select { font-family: inherit; }

    /* Scrollbars — keep them out of the way */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--rc-outline); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
    *::-webkit-scrollbar-thumb:hover { background: var(--rc-fg2); background-clip: padding-box; border: 2px solid transparent; }

    /* Density modifier */
    [data-density="compact"]     { --row-pad: 8px; --section-pad: 24px; }
    [data-density="comfortable"] { --row-pad: 12px; --section-pad: 32px; }
    [data-density="cozy"]        { --row-pad: 16px; --section-pad: 40px; }

    /* Smooth route transition — disabled for clean screenshots */
    .rc-route { opacity: 1; }

    /* Drawer slide-in */
    @keyframes drawerIn {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }
    .rc-drawer { animation: drawerIn .22s cubic-bezier(.2,.7,.2,1); }

    /* Skeleton shimmer */
    @keyframes shimmer {
      from { background-position: -400px 0; }
      to   { background-position: 400px 0; }
    }
    .rc-skel {
      background: linear-gradient(90deg, var(--rc-outline) 0%, var(--rc-bg) 50%, var(--rc-outline) 100%);
      background-size: 800px 100%;
      animation: shimmer 1.4s linear infinite;
      border-radius: 4px;
    }

    /* Disable focus rings on click but keep them for keyboard */
    button:focus { outline: none; }
    button:focus-visible { outline: 2px solid var(--rc-primary); outline-offset: 2px; }
    input:focus, textarea:focus, select:focus { outline: none; }

    /* Smooth selection */
    ::selection { background: var(--rc-primary-container); color: var(--rc-on-primary-ctr); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</head>
